spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sentinelcore
    username: sentinelcore
    password: sentinelcore
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.sentinelcore: DEBUG
    org.flywaydb: INFO
