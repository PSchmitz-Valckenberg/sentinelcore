services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinelcore-postgres
    environment:
      POSTGRES_DB: sentinelcore
      POSTGRES_USER: sentinelcore
      POSTGRES_PASSWORD: sentinelcore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
