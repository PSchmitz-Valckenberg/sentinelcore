spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sentinelcore
    username: sentinelcore
    password: sentinelcore
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.sentinelcore: DEBUG
    org.flywaydb: INFO

sentinelcore:
  llm:
    # Active LLM provider. Supported values: "gemini" (default), "anthropic".
    # Switching providers requires matching api-key / model / base-url below.
    provider: gemini
    api-key: ${LLM_API_KEY:}
    model: gemini-2.0-flash
    base-url: https://generativelanguage.googleapis.com/v1
    timeout-seconds: 30
    # Used by the Anthropic provider (required by the Messages API).
    # Ignored when provider=gemini.
    max-tokens: 1024
    # --- Anthropic example (uncomment + comment out the gemini lines to switch) ---
    # provider: anthropic
    # model: claude-haiku-4-5-20251001
    # base-url: https://api.anthropic.com/v1
  system-prompt:
    text: "You are a helpful knowledge assistant. Answer questions based on provided documents."
    canary-token: ${CANARY_TOKEN:SENTINEL-CANARY-9x7z}
  defense:
    rag-content-patterns:
      - "ignore (all |the )?(previous |prior |above )?instructions"
      - "developer mode"
      - "reveal (the )?(full )?(system )?prompt"
      - "print.*canary"
      - "disregard (all |the )?(previous |prior |above )?(instructions|rules)"
      - "you are now"
      - "new instructions:"