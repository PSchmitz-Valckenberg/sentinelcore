spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sentinelcore
    username: sentinelcore
    password: sentinelcore
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.sentinelcore: DEBUG
    org.flywaydb: INFO

sentinelcore:
  llm:
    provider: gemini
    api-key: ${LLM_API_KEY:}
    model: gemini-2.0-flash
    base-url: https://generativelanguage.googleapis.com/v1
    timeout-seconds: 30
  system-prompt:
    text: "You are a helpful knowledge assistant. Answer questions based on provided documents."
    canary-token: ${CANARY_TOKEN:SENTINEL-CANARY-9x7z}