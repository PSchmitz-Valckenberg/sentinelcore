spring:
  # Intentionally invalid datasource defaults. Without these, Spring would
  # merge in the localhost:5432 datasource from application.yml whenever the
  # test profile is active, silently connecting tests to a developer's local
  # database. SentinelCoreIntegrationTest overrides these at runtime via
  # @DynamicPropertySource with the Testcontainers-managed Postgres.
  datasource:
    url: jdbc:postgresql://invalid-test-host:1/invalid-test-db
    username: invalid-test-user
    password: invalid-test-password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Defense-in-depth: if a misconfigured test ever did reach a real database,
    # Flyway must never drop its schema. Testcontainers gives every run a fresh
    # DB, so clean-on-validation-error is never needed in the test profile.
    clean-disabled: true
    clean-on-validation-error: false

sentinelcore:
  llm:
    provider: gemini
    api-key: test-key-not-used
    model: gemini-2.0-flash
    base-url: https://generativelanguage.googleapis.com/v1
    timeout-seconds: 30
  system-prompt:
    text: "You are a helpful knowledge assistant. Answer questions based on provided documents."
    canary-token: "SENTINEL-CANARY-9x7z"

logging:
  level:
    com.sentinelcore: WARN
    org.flywaydb: WARN
