spring:
  datasource:
    url: jdbc:tc:postgresql:15:///sentinelcore
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

sentinelcore:
  llm:
    provider: gemini
    api-key: test-key-not-used
    model: gemini-2.0-flash
    base-url: https://generativelanguage.googleapis.com/v1
    timeout-seconds: 30
  system-prompt:
    text: "You are a helpful knowledge assistant. Answer questions based on provided documents."
    canary-token: "SENTINEL-CANARY-9x7z"

logging:
  level:
    com.sentinelcore: WARN
    org.flywaydb: WARN